<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operational Map</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--purple:#6D2077;--purple-light:#9B4DCA;--purple-glow:rgba(109,32,119,0.4);
--blue:#00A4E4;--blue-glow:rgba(0,164,228,0.3);
--orange:#E8742B;--orange-glow:rgba(232,116,43,0.3);
--green:#16a34a;--green-bg:#dcfce7;
--amber:#d97706;--amber-bg:#fef3c7;
--red:#dc2626;--red-bg:#fee2e2;
--gray:#6b7280;
--bg:#0d1117;--bg-light:#161b22;--card:#1c2333;--card-border:#2d3548;
--text:#e6edf3;--text-muted:#8b949e;--text-dim:#484f58;
--radius:10px;--transition:0.25s ease;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
canvas{display:block;cursor:grab}
canvas:active{cursor:grabbing}
canvas.hovering{cursor:pointer}

/* OVERLAY UI */
.ui-layer{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10}
.ui-layer>*{pointer-events:auto}

/* TOP BAR */
.topbar{display:flex;align-items:center;padding:12px 20px;gap:12px;background:linear-gradient(180deg,rgba(13,17,23,0.95) 0%,rgba(13,17,23,0) 100%);padding-bottom:40px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{font-size:22px}
.logo-text{font-size:16px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.logo-dot{font-size:12px;color:var(--purple-light);margin-left:2px}

.search-wrap{position:relative;flex:0 1 340px;margin-left:20px}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;border:1px solid var(--card-border);border-radius:20px;font-size:13px;background:var(--bg-light);color:var(--text);transition:var(--transition);font-family:inherit}
.search-wrap input:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,32,119,0.15);background:var(--card)}
.search-wrap input::placeholder{color:var(--text-dim)}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;opacity:0.5}

.view-toggle{display:flex;background:var(--bg-light);border-radius:20px;padding:3px;border:1px solid var(--card-border);margin-left:12px}
.toggle-btn{padding:6px 16px;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:var(--transition);font-family:inherit}
.toggle-btn.active{background:var(--purple);color:#fff}
.toggle-btn:hover:not(.active){color:var(--text)}

.spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 6px;background:var(--bg-light);border:1px solid var(--card-border);border-radius:20px;font-size:12px;color:var(--text-muted)}
.user-avatar{width:26px;height:26px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}
.user-name{font-weight:600;color:var(--text)}

/* STATS BAR — bottom left */
.stats-bar{position:fixed;bottom:16px;left:16px;display:flex;gap:10px;z-index:10;pointer-events:auto}
.stat-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;background:rgba(28,35,51,0.85);border:1px solid var(--card-border);border-radius:16px;font-size:11px;font-weight:600;color:var(--text-muted);backdrop-filter:blur(8px)}
.stat-dot{width:7px;height:7px;border-radius:50%}
.stat-dot.green{background:var(--green)}.stat-dot.amber{background:var(--amber)}.stat-dot.red{background:var(--red)}.stat-dot.gray{background:var(--gray)}

/* LEGEND — bottom right */
.legend{position:fixed;bottom:16px;right:16px;display:flex;gap:14px;padding:8px 16px;background:rgba(28,35,51,0.85);border:1px solid var(--card-border);border-radius:16px;backdrop-filter:blur(8px);z-index:10;pointer-events:auto}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-weight:500}
.legend-dot{width:10px;height:10px;border-radius:50%}
.legend-dot.purple{background:var(--purple)}.legend-dot.blue{background:var(--blue)}.legend-dot.orange{background:var(--orange)}.legend-dot.gray{background:var(--gray)}
.legend-dot.square{border-radius:3px}

/* DETAIL PANEL */
.detail-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:50}
.detail-overlay.show{display:block}
.detail-panel{position:fixed;top:0;right:0;width:380px;max-width:85vw;height:100vh;background:var(--card);border-left:1px solid var(--card-border);z-index:51;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s ease;box-shadow:-8px 0 30px rgba(0,0,0,0.4)}
.detail-panel.show{transform:translateX(0)}
.detail-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:8px;border:1px solid var(--card-border);background:var(--bg-light);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:var(--transition);z-index:1}
.detail-close:hover{background:var(--red-bg);color:var(--red);border-color:transparent}
.detail-head{padding:24px 22px 18px;border-bottom:1px solid var(--card-border)}
.detail-head .dh-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.detail-head .dh-type .type-dot{width:8px;height:8px;border-radius:50%}
.detail-head .dh-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;padding-right:36px}
.detail-head .dh-sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.detail-body{padding:18px 22px}
.detail-section{margin-bottom:18px}
.detail-section h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-bottom:8px}
.detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(45,53,72,0.5);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-row .dl{color:var(--text-muted)}
.detail-row .dv{font-weight:600;text-align:right;max-width:55%}
.conn-list{margin-top:4px}
.conn-list-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;font-size:12px;cursor:pointer;transition:var(--transition);margin-bottom:2px}
.conn-list-item:hover{background:rgba(109,32,119,0.08)}
.conn-list-item .cli-left{display:flex;align-items:center;gap:8px}
.conn-list-item .cli-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conn-list-item .cli-name{font-weight:600}
.conn-list-item .cli-role{color:var(--text-muted);font-size:11px;margin-left:6px}
.conn-list-item .cli-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px}
.status-ok{background:rgba(22,163,74,0.15);color:var(--green)}
.status-warn{background:rgba(217,119,6,0.15);color:var(--amber)}
.status-stale{background:rgba(220,38,38,0.15);color:var(--red)}

.detail-actions{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--card-border);flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--card-border);transition:var(--transition);font-family:inherit;display:inline-flex;align-items:center;gap:5px;background:var(--bg-light);color:var(--text-muted)}
.btn:hover{border-color:var(--purple);color:var(--purple)}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:var(--purple-light)}
.btn-agent{opacity:0.4;cursor:not-allowed;position:relative}
.btn-agent:hover{border-color:var(--card-border);color:var(--text-muted)}
.btn-agent::after{content:'Coming Soon';position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text-muted);padding:3px 8px;border-radius:6px;font-size:10px;white-space:nowrap;border:1px solid var(--card-border);display:none}
.btn-agent:hover::after{display:block}

/* AUDIT TRAIL */
.audit-trail{margin-top:4px}
.audit-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:11px;color:var(--text-muted)}
.audit-icon{flex-shrink:0;margin-top:1px}

/* TOAST */
.toast-container{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--card);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;border:1px solid var(--card-border);box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;animation:toastIn 0.3s ease;white-space:nowrap}
.toast.toast-out{animation:toastOut 0.3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(16px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-10px)}}

/* AI HINT — bottom center */
.ai-hint{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);padding:8px 18px;background:rgba(109,32,119,0.12);border:1px solid rgba(109,32,119,0.2);border-radius:20px;font-size:11px;color:var(--purple-light);font-weight:500;z-index:10;white-space:nowrap;backdrop-filter:blur(8px);pointer-events:auto}

/* HELP */
.help-hint{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:8px 16px;background:rgba(28,35,51,0.9);border:1px solid var(--card-border);border-radius:10px;font-size:11px;color:var(--text-dim);z-index:10;white-space:nowrap;transition:opacity 0.5s;backdrop-filter:blur(8px);pointer-events:none}
</style>
</head>
<body>

<canvas id="graph"></canvas>

<!-- UI OVERLAY -->
<div class="ui-layer">
  <div class="topbar">
    <div class="logo">
      <span class="logo-icon">🗺️</span>
      <span class="logo-text">Operational Map</span>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search people, clients, teams..." oninput="handleSearch(this.value)">
    </div>
    <div class="view-toggle">
      <button class="toggle-btn active" data-view="graph" onclick="setView('graph',this)">🕸️ Graph</button>

    </div>

</div>

<div class="stats-bar">
  <span class="stat-chip"><span class="stat-dot green"></span> 8 Active</span>
  <span class="stat-chip"><span class="stat-dot amber"></span> 3 Onboarding</span>

</div>

<div class="ai-hint">🤖 Agent Layer — Click any node → summaries, docs, smart updates — Coming Soon</div>

<div id="help-hint" class="help-hint">Scroll to zoom · Drag to pan · Click nodes to explore</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <button class="detail-close" onclick="closeDetail()">&times;</button>
  <div class="detail-head" id="detail-head"></div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<script>
// ============================================================
// DATA
// ============================================================
const DATA = {
  people: [

    {id:'sarah',name:"Sarah Chen",initials:"SC",role:"Project Coordinator",team:"ITAD Disposal"},

  ],
  clients: [

    {id:'techvault',name:"TechVault Industries",status:"Onboarding",daysStale:1},

  ],
  // Edges: personId → clientId with role info
  assignments: [
    {from:'neal',to:'acme',role:"Coordinator",primary:true,verified:"Apr 10, 2026",verifiedBy:"Marcus Webb"},
    {from:'sarah',to:'acme',role:"Backup",primary:false,verified:"Apr 10, 2026",verifiedBy:"Neal Anderson"},

    {from:'marcus',to:'pinnacle',role:"Coordinator",primary:true,verified:"Mar 28, 2026",verifiedBy:"Neal Anderson"},

    {from:'marcus',to:'redwood',role:"Backup",primary:false,verified:null,verifiedBy:null},
    {from:'sarah',to:'atlas',role:"Coordinator",primary:true,verified:"Apr 10, 2026",verifiedBy:"Neal Anderson"},
    {from:'neal',to:'atlas',role:"Backup",primary:false,verified:"Apr 10, 2026",verifiedBy:"Sarah Chen"},
    {from:'marcus',to:'beacon',role:"Coordinator",primary:true,verified:"Apr 5, 2026",verifiedBy:"Neal Anderson"},

    {from:'marcus',to:'northstar',role:"Coordinator",primary:true,verified:"Apr 9, 2026",verifiedBy:"Neal Anderson"},
    {from:'neal',to:'northstar',role:"Backup",primary:false,verified:"Apr 9, 2026",verifiedBy:"Marcus Webb"},
    {from:'neal',to:'silverline',role:"Coordinator",primary:true,verified:"Feb 10, 2026",verifiedBy:"Marcus Webb"},
    {from:'sarah',to:'silverline',role:"Backup",primary:false,verified:null,verifiedBy:null},

  ],
  // Client → DG group
  clientGroups: {
    acme:'dg_east',meridian:'dg_central',techvault:'dg_west',pinnacle:'dg_east',
    redwood:'dg_west',atlas:'dg_central',beacon:'dg_east',crestline:'dg_central',
    ironbridge:'dg_west',northstar:'dg_east',silverline:'dg_central',vanguard:'dg_west'
  }
};

// ============================================================
// GRAPH NODES & EDGES
// ============================================================
const nodes = [];
const edges = [];
const nodeMap = {};

function buildGraph() {
  nodes.length = 0; edges.length = 0;
  // People nodes
  DATA.people.forEach(p => {
    const connCount = DATA.assignments.filter(a => a.from === p.id).length;
    const n = {id:p.id,type:'person',label:p.name,initials:p.initials,role:p.role,team:p.team,you:p.you||false,
      x:0,y:0,vx:0,vy:0,
      radius: 18 + connCount * 2,
      baseColor:'#6D2077',glowColor:'rgba(109,32,119,0.35)',
      opacity:1,data:p,connCount};
    nodes.push(n); nodeMap[n.id] = n;
  });
  // Client nodes
  DATA.clients.forEach(c => {
    const connCount = DATA.assignments.filter(a => a.to === c.id).length +
                      DATA.externals.filter(e => e.clientId === c.id).length + 1; // +1 for DG
    const health = c.daysStale < 30 ? 1 : c.daysStale < 60 ? 0.55 : 0.3;
    const n = {id:c.id,type:'client',label:c.name,status:c.status,daysStale:c.daysStale,
      x:0,y:0,vx:0,vy:0,
      radius: 20 + connCount * 1.5,
      baseColor:'#00A4E4',glowColor:'rgba(0,164,228,0.25)',
      opacity:health,data:c,connCount};
    nodes.push(n); nodeMap[n.id] = n;
  });
  // External contact nodes
  DATA.externals.forEach(e => {
    const n = {id:e.id,type:'external',label:e.name,role:e.role,clientId:e.clientId,
      x:0,y:0,vx:0,vy:0,
      radius:10,
      baseColor:'#E8742B',glowColor:'rgba(232,116,43,0.2)',
      opacity:0.8,data:e,connCount:1};
    nodes.push(n); nodeMap[n.id] = n;
  });
  // Group nodes
  DATA.groups.forEach(g => {
    const connCount = Object.values(DATA.clientGroups).filter(v => v === g.id).length;
    const n = {id:g.id,type:'group',label:g.name,
      x:0,y:0,vx:0,vy:0,
      radius:12 + connCount,
      baseColor:'#6b7280',glowColor:'rgba(107,114,128,0.2)',
      opacity:0.7,data:g,connCount};
    nodes.push(n); nodeMap[n.id] = n;
  });

  // Edges: assignments (person → client)
  DATA.assignments.forEach(a => {
    edges.push({from:a.from,to:a.to,label:a.role,primary:a.primary,type:'assignment',data:a});
  });
  // Edges: external → client
  DATA.externals.forEach(e => {
    edges.push({from:e.id,to:e.clientId,label:e.role,type:'external'});
  });
  // Edges: client → DG group
  Object.entries(DATA.clientGroups).forEach(([cid,gid]) => {
    edges.push({from:cid,to:gid,label:'DG',type:'group'});
  });

  // Initial positions — spread in a circle, "you" at center
  const cx = canvas.width / 2, cy = canvas.height / 2;
  nodes.forEach((n, i) => {
    if (n.you) { n.x = cx; n.y = cy; return; }
    const angle = (i / nodes.length) * Math.PI * 2;
    const dist = 120 + Math.random() * 200;
    n.x = cx + Math.cos(angle) * dist;
    n.y = cy + Math.sin(angle) * dist;
  });
}

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', () => { resize(); });
resize();

// ============================================================
// CAMERA (zoom & pan)
// ============================================================
let cam = {x: 0, y: 0, zoom: 1, targetZoom: 1, targetX: 0, targetY: 0};

function screenToWorld(sx, sy) {
  return {x: (sx - W/2) / cam.zoom + cam.x, y: (sy - H/2) / cam.zoom + cam.y};
}
function worldToScreen(wx, wy) {
  return {x: (wx - cam.x) * cam.zoom + W/2, y: (wy - cam.y) * cam.zoom + H/2};
}

// ============================================================
// STATE
// ============================================================
let currentView = 'graph';
let searchQuery = '';
let selectedNode = null;
let hoveredNode = null;
let draggingNode = null;
let isPanning = false;
let panStart = {x:0, y:0, camX:0, camY:0};
let simRunning = true;
let simAlpha = 1; // simulation cooling
let time = 0;
let helpVisible = true;

// ============================================================
// FORCE SIMULATION
// ============================================================
function simulate() {
  if (!simRunning) return;
  const alpha = simAlpha;
  if (alpha < 0.001) { simRunning = false; return; }
  simAlpha *= 0.997;

  const centerX = W / 2, centerY = H / 2;
  const N = nodes.length;

  // Center gravity — pull toward center
  nodes.forEach(n => {
    if (n === draggingNode) return;
    const dx = centerX - n.x, dy = centerY - n.y;
    const strength = n.you ? 0.0005 : 0.0003;
    n.vx += dx * strength * alpha;
    n.vy += dy * strength * alpha;
  });

  // Repulsion between all nodes
  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const minDist = (a.radius + b.radius) * 2.5;
      if (dist < minDist) dist = minDist;
      const force = -800 * alpha / (dist * dist);
      const fx = (dx / dist) * force, fy = (dy / dist) * force;
      if (a !== draggingNode) { a.vx -= fx; a.vy -= fy; }
      if (b !== draggingNode) { b.vx += fx; b.vy += fy; }
    }
  }

  // Attraction along edges
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const idealDist = (a.type === 'external' || b.type === 'external') ? 80 :
                      (a.type === 'group' || b.type === 'group') ? 100 : 140;
    const force = (dist - idealDist) * 0.0015 * alpha;
    const fx = (dx / dist) * force, fy = (dy / dist) * force;
    if (a !== draggingNode) { a.vx += fx; a.vy += fy; }
    if (b !== draggingNode) { b.vx -= fx; b.vy -= fy; }
  });

  // Apply velocities with damping
  nodes.forEach(n => {
    if (n === draggingNode) { n.vx = 0; n.vy = 0; return; }
    n.vx *= 0.85;
    n.vy *= 0.85;
    n.x += n.vx;
    n.y += n.vy;
  });
}

// ============================================================
// TREE LAYOUT
// ============================================================
let treePositions = null;

function computeTreeLayout() {
  // Two-level tree: People on left column, clients on right column, connected by lines
  const cx = W / 2, cy = H / 2;
  treePositions = {};

  const ppl = DATA.people;
  const cls = DATA.clients;
  const pSpacing = Math.min(120, (H - 160) / ppl.length);
  const cSpacing = Math.min(70, (H - 160) / cls.length);
  const pX = cx - 260, cX = cx + 200;

  ppl.forEach((p, i) => {
    const y = cy - ((ppl.length - 1) * pSpacing) / 2 + i * pSpacing;
    treePositions[p.id] = {x: pX, y};
  });
  cls.forEach((c, i) => {
    const y = cy - ((cls.length - 1) * cSpacing) / 2 + i * cSpacing;
    treePositions[c.id] = {x: cX, y};
  });
  // Externals: further right of their client
  DATA.externals.forEach((e, i) => {
    const cp = treePositions[e.clientId];
    if (cp) {
      treePositions[e.id] = {x: cX + 160, y: cp.y + (i % 3 - 1) * 30};
    }
  });
  // Groups: far right
  const gY = cy - ((DATA.groups.length - 1) * 60) / 2;
  DATA.groups.forEach((g, i) => {
    treePositions[g.id] = {x: cX + 300, y: gY + i * 60};
  });
}

function applyTreeLayout() {
  if (!treePositions) computeTreeLayout();
  nodes.forEach(n => {
    const t = treePositions[n.id];
    if (t) { n.x = t.x; n.y = t.y; n.vx = 0; n.vy = 0; }
  });
  simRunning = false;
  simAlpha = 0;
}

// ============================================================
// RENDERING
// ============================================================
function getNodeScreenPos(n) {
  return worldToScreen(n.x, n.y);
}

function getNodeAlpha(node) {
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const match = node.label.toLowerCase().includes(q) ||
                  (node.role && node.role.toLowerCase().includes(q)) ||
                  (node.team && node.team.toLowerCase().includes(q)) ||
                  (node.status && node.status.toLowerCase().includes(q));
    return match ? 1 : 0.08;
  }
  if (selectedNode) {
    if (node === selectedNode) return 1;
    const connected = edges.some(e =>
      (e.from === selectedNode.id && e.to === node.id) ||
      (e.to === selectedNode.id && e.from === node.id));
    return connected ? 0.9 : 0.1;
  }
  return node.opacity;
}

function draw() {
  time += 0.016;
  ctx.clearRect(0, 0, W, H);

  // Background subtle grid dots
  const gridSize = 40 * cam.zoom;
  if (gridSize > 10) {
    ctx.fillStyle = 'rgba(45,53,72,0.25)';
    const offX = (W / 2 - cam.x * cam.zoom) % gridSize;
    const offY = (H / 2 - cam.y * cam.zoom) % gridSize;
    for (let x = offX; x < W; x += gridSize) {
      for (let y = offY; y < H; y += gridSize) {
        ctx.beginPath();
        ctx.arc(x, y, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Draw edges
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    const sa = getNodeScreenPos(a), sb = getNodeScreenPos(b);
    const alphaA = getNodeAlpha(a), alphaB = getNodeAlpha(b);
    const edgeAlpha = Math.min(alphaA, alphaB) * 0.4;
    if (edgeAlpha < 0.01) return;

    ctx.beginPath();
    ctx.moveTo(sa.x, sa.y);
    ctx.lineTo(sb.x, sb.y);
    ctx.strokeStyle = e.primary
      ? `rgba(109,32,119,${edgeAlpha * 2})`
      : e.type === 'external'
        ? `rgba(232,116,43,${edgeAlpha})`
        : e.type === 'group'
          ? `rgba(107,114,128,${edgeAlpha})`
          : `rgba(139,148,158,${edgeAlpha})`;
    ctx.lineWidth = e.primary ? 2 : 1;
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach(n => {
    const s = getNodeScreenPos(n);
    const r = n.radius * cam.zoom;
    const alpha = getNodeAlpha(n);
    if (alpha < 0.01 || r < 1) return;

    const isHovered = n === hoveredNode;
    const isSelected = n === selectedNode;

    // Stale pulse
    let pulseScale = 1;
    if (n.daysStale >= 30 && !searchQuery && !selectedNode) {
      pulseScale = 1 + Math.sin(time * 2 + nodes.indexOf(n)) * 0.04;
    }

    // Glow
    if ((isHovered || isSelected || n.you) && alpha > 0.3) {
      const gR = r * 2.5 * pulseScale;
      const grad = ctx.createRadialGradient(s.x, s.y, r * 0.5, s.x, s.y, gR);
      grad.addColorStop(0, n.glowColor);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.globalAlpha = alpha * (isHovered || isSelected ? 0.8 : 0.4);
      ctx.beginPath();
      ctx.arc(s.x, s.y, gR, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Node body
    ctx.globalAlpha = alpha;
    const drawR = r * pulseScale;

    if (n.type === 'client') {
      // Rounded rectangle for clients
      const rw = drawR * 2.2, rh = drawR * 1.6;
      const rx = s.x - rw / 2, ry = s.y - rh / 2;
      const cr = 8 * cam.zoom;
      ctx.beginPath();
      ctx.moveTo(rx + cr, ry);
      ctx.lineTo(rx + rw - cr, ry);
      ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + cr);
      ctx.lineTo(rx + rw, ry + rh - cr);
      ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - cr, ry + rh);
      ctx.lineTo(rx + cr, ry + rh);
      ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - cr);
      ctx.lineTo(rx, ry + cr);
      ctx.quadraticCurveTo(rx, ry, rx + cr, ry);
      ctx.closePath();
      ctx.fillStyle = n.baseColor;
      ctx.fill();
      if (isSelected) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }
    } else {
      // Circle for people, externals, groups
      ctx.beginPath();
      ctx.arc(s.x, s.y, drawR, 0, Math.PI * 2);
      ctx.fillStyle = n.baseColor;
      ctx.fill();
      if (n.you) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2.5 * cam.zoom;
        ctx.stroke();
      } else if (isSelected) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    // Label
    if (r > 6) {
      const fontSize = Math.max(8, Math.min(13, r * 0.55));
      ctx.font = `700 ${fontSize}px Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';

      if (n.type === 'person') {
        ctx.fillText(n.initials || n.label.charAt(0), s.x, s.y);
      } else if (n.type === 'client') {
        // Truncate label to fit
        const maxW = drawR * 2;
        let lbl = n.label;
        if (ctx.measureText(lbl).width > maxW) {
          while (lbl.length > 3 && ctx.measureText(lbl + '…').width > maxW) lbl = lbl.slice(0, -1);
          lbl += '…';
        }
        ctx.fillText(lbl, s.x, s.y);
      } else if (n.type === 'group') {
        ctx.font = `600 ${Math.max(7, fontSize * 0.8)}px Inter, sans-serif`;
        ctx.fillText(n.label.replace('ITAD-Disposal-', ''), s.x, s.y);
      } else {
        ctx.fillText(n.label.split(' ')[0].charAt(0) + (n.label.split(' ')[1] || '').charAt(0), s.x, s.y);
      }

      // External label below
      if (r > 14) {
        ctx.font = `500 ${Math.max(8, fontSize * 0.75)}px Inter, sans-serif`;
        ctx.fillStyle = `rgba(230,237,243,${alpha * 0.7})`;
        const labelY = n.type === 'client' ? s.y + drawR * 0.8 + fontSize : s.y + drawR + fontSize * 0.8;
        ctx.fillText(n.type === 'person' ? n.label : '', s.x, labelY);
      }
    }

    // Status indicator for clients
    if (n.type === 'client' && r > 10) {
      const iR = 4 * cam.zoom;
      const iX = s.x + drawR * 1.1 - iR;
      const iY = s.y - drawR * 0.8 + iR;
      ctx.beginPath();
      ctx.arc(iX, iY, iR, 0, Math.PI * 2);
      ctx.fillStyle = n.daysStale >= 60 ? '#dc2626' : n.daysStale >= 30 ? '#d97706' :
                      n.status === 'Onboarding' ? '#d97706' : '#16a34a';
      ctx.fill();
    }

    ctx.globalAlpha = 1;
  });

  // Tooltip for hovered node
  if (hoveredNode && !draggingNode && !selectedNode) {
    const s = getNodeScreenPos(hoveredNode);
    const n = hoveredNode;
    let line1 = n.label;
    let line2 = n.type === 'person' ? n.role : n.type === 'client' ? n.status + (n.daysStale >= 30 ? ' · ⚠️ ' + n.daysStale + 'd stale' : '') : n.role || n.label;

    ctx.font = '600 12px Inter, sans-serif';
    const tw = Math.max(ctx.measureText(line1).width, ctx.measureText(line2).width) + 20;
    const th = 42;
    const tx = s.x - tw / 2;
    const ty = s.y - n.radius * cam.zoom - th - 10;

    ctx.fillStyle = 'rgba(28,35,51,0.95)';
    roundRect(ctx, tx, ty, tw, th, 8);
    ctx.fill();
    ctx.strokeStyle = 'rgba(45,53,72,0.8)';
    ctx.lineWidth = 1;
    roundRect(ctx, tx, ty, tw, th, 8);
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.font = '600 12px Inter, sans-serif';
    ctx.fillStyle = '#e6edf3';
    ctx.fillText(line1, s.x, ty + 16);
    ctx.font = '400 10px Inter, sans-serif';
    ctx.fillStyle = '#8b949e';
    ctx.fillText(line2, s.x, ty + 32);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
// ANIMATION LOOP
// ============================================================
function loop() {
  // Smooth camera
  cam.x += (cam.targetX - cam.x) * 0.08;
  cam.y += (cam.targetY - cam.y) * 0.08;
  cam.zoom += (cam.targetZoom - cam.zoom) * 0.08;

  if (currentView === 'graph') simulate();
  draw();
  requestAnimationFrame(loop);
}

// ============================================================
// HIT TESTING
// ============================================================
function hitTest(mx, my) {
  const world = screenToWorld(mx, my);
  // Reverse order so topmost drawn node gets priority
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = world.x - n.x, dy = world.y - n.y;
    const hitR = n.radius * 1.3;
    if (dx * dx + dy * dy <= hitR * hitR) return n;
  }
  return null;
}

// ============================================================
// MOUSE EVENTS
// ============================================================
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;

  if (draggingNode) {
    const world = screenToWorld(e.clientX, e.clientY);
    draggingNode.x = world.x;
    draggingNode.y = world.y;
    draggingNode.vx = 0;
    draggingNode.vy = 0;
    simRunning = true;
    simAlpha = Math.max(simAlpha, 0.1);
    return;
  }

  if (isPanning) {
    const dx = e.clientX - panStart.x;
    const dy = e.clientY - panStart.y;
    cam.targetX = panStart.camX - dx / cam.zoom;
    cam.targetY = panStart.camY - dy / cam.zoom;
    return;
  }

  const hit = hitTest(e.clientX, e.clientY);
  hoveredNode = hit;
  canvas.className = hit ? 'hovering' : '';
});

canvas.addEventListener('mousedown', e => {
  if (helpVisible) { helpVisible = false; document.getElementById('help-hint').style.opacity = '0'; }
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    draggingNode = hit;
  } else {
    isPanning = true;
    panStart = {x: e.clientX, y: e.clientY, camX: cam.targetX, camY: cam.targetY};
  }
});

canvas.addEventListener('mouseup', e => {
  if (draggingNode) {
    // If barely moved, treat as click
    const hit = hitTest(e.clientX, e.clientY);
    if (hit === draggingNode) {
      selectNode(hit);
    }
    draggingNode = null;
  }
  isPanning = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  cam.targetZoom = Math.max(0.15, Math.min(4, cam.targetZoom * zoomFactor));
}, {passive: false});

canvas.addEventListener('dblclick', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    // Focus on this node
    cam.targetX = hit.x;
    cam.targetY = hit.y;
    cam.targetZoom = Math.max(cam.targetZoom, 1.5);
    selectNode(hit);
  }
});

// ============================================================
// NODE SELECTION / DETAIL PANEL
// ============================================================
function selectNode(node) {
  if (selectedNode === node) { closeDetail(); return; }
  selectedNode = node;
  openNodeDetail(node);
}

function openNodeDetail(node) {
  const head = document.getElementById('detail-head');
  const body = document.getElementById('detail-body');

  let typeLabel, typeColor;
  if (node.type === 'person') { typeLabel = 'Person'; typeColor = '#6D2077'; }
  else if (node.type === 'client') { typeLabel = 'Client'; typeColor = '#00A4E4'; }
  else if (node.type === 'external') { typeLabel = 'External Contact'; typeColor = '#E8742B'; }
  else { typeLabel = 'Distribution Group'; typeColor = '#6b7280'; }

  head.innerHTML = `
    <div class="dh-type"><span class="type-dot" style="background:${typeColor}"></span>${typeLabel}</div>
    <div class="dh-title">${node.label}</div>
    <div class="dh-sub">${node.type === 'person' ? node.role + ' · ' + node.team :
      node.type === 'client' ? node.status + (node.daysStale >= 30 ? ' · ⚠️ ' + node.daysStale + ' days stale' : ' · Updated ' + node.daysStale + 'd ago') :
      node.role || ''}</div>
  `;

  let html = '';

  if (node.type === 'person') {
    const conns = DATA.assignments.filter(a => a.from === node.id);
    html += `<div class="detail-section"><h4>Connections (${conns.length} clients)</h4><div class="conn-list">`;
    conns.forEach(c => {
      const client = DATA.clients.find(cl => cl.id === c.to);
      if (!client) return;
      const stClass = client.daysStale >= 60 ? 'status-stale' : client.daysStale >= 30 ? 'status-warn' : 'status-ok';
      const stLabel = client.daysStale >= 30 ? '⚠️ ' + client.daysStale + 'd' : '✅';
      html += `<div class="conn-list-item" onclick="focusNode('${client.id}')">
        <div class="cli-left"><span class="cli-dot" style="background:#00A4E4"></span><span class="cli-name">${client.name}</span><span class="cli-role">${c.role}${c.primary ? ' · Primary' : ''}</span></div>
        <span class="cli-status ${stClass}">${stLabel}</span></div>`;
    });
    html += `</div></div>`;

    html += `<div class="detail-section"><h4>Overview</h4>
      <div class="detail-row"><span class="dl">Role</span><span class="dv">${node.role}</span></div>
      <div class="detail-row"><span class="dl">Team</span><span class="dv">${node.team}</span></div>
      <div class="detail-row"><span class="dl">Total Clients</span><span class="dv">${conns.length}</span></div>
      <div class="detail-row"><span class="dl">Primary On</span><span class="dv">${conns.filter(c => c.primary).length}</span></div>
    </div>`;

  } else if (node.type === 'client') {
    const conns = DATA.assignments.filter(a => a.to === node.id);
    const exts = DATA.externals.filter(e => e.clientId === node.id);
    const dgId = DATA.clientGroups[node.id];
    const dg = DATA.groups.find(g => g.id === dgId);

    html += `<div class="detail-section"><h4>Internal Team (${conns.length})</h4><div class="conn-list">`;
    conns.forEach(c => {
      const person = DATA.people.find(p => p.id === c.from);
      if (!person) return;
      const stClass = c.verified ? 'status-ok' : 'status-warn';
      const stLabel = c.verified ? '✅' : '⏳';
      html += `<div class="conn-list-item" onclick="focusNode('${person.id}')">
        <div class="cli-left"><span class="cli-dot" style="background:#6D2077"></span><span class="cli-name">${person.name}</span><span class="cli-role">${c.role}${c.primary ? ' · Primary' : ''}</span></div>
        <span class="cli-status ${stClass}">${stLabel}</span></div>`;
    });
    html += `</div></div>`;

    if (exts.length) {
      html += `<div class="detail-section"><h4>External Contacts (${exts.length})</h4><div class="conn-list">`;
      exts.forEach(e => {
        html += `<div class="conn-list-item" onclick="focusNode('${e.id}')">
          <div class="cli-left"><span class="cli-dot" style="background:#E8742B"></span><span class="cli-name">${e.name}</span><span class="cli-role">${e.role}</span></div></div>`;
      });
      html += `</div></div>`;
    }

    if (dg) {
      html += `<div class="detail-section"><h4>Distribution Group</h4>
        <div class="conn-list-item" onclick="focusNode('${dg.id}')">
          <div class="cli-left"><span class="cli-dot" style="background:#6b7280"></span><span class="cli-name">${dg.name}</span></div></div></div>`;
    }

    html += `<div class="detail-section"><h4>Details</h4>
      <div class="detail-row"><span class="dl">Status</span><span class="dv">${node.status}</span></div>
      <div class="detail-row"><span class="dl">Days Since Update</span><span class="dv">${node.daysStale}d</span></div>
      <div class="detail-row"><span class="dl">Connections</span><span class="dv">${conns.length + exts.length + (dg ? 1 : 0)}</span></div>
      <div class="detail-row"><span class="dl">Health</span><span class="dv">${node.daysStale < 15 ? '🟢 Strong' : node.daysStale < 30 ? '🟡 OK' : node.daysStale < 60 ? '🟠 Needs Attention' : '🔴 Critical'}</span></div>
    </div>`;

    // Audit trail
    html += `<div class="detail-section"><h4>Recent Activity</h4><div class="audit-trail">`;
    conns.forEach(c => {
      if (c.verified) {
        html += `<div class="audit-item"><span class="audit-icon">✅</span>${c.verifiedBy} verified ${DATA.people.find(p=>p.id===c.from)?.name || ''} as ${c.role} — ${c.verified}</div>`;
      }
    });
    html += `</div></div>`;

  } else if (node.type === 'external') {
    const client = DATA.clients.find(c => c.id === node.clientId);
    html += `<div class="detail-section"><h4>Details</h4>
      <div class="detail-row"><span class="dl">Name</span><span class="dv">${node.label}</span></div>
      <div class="detail-row"><span class="dl">Role</span><span class="dv">${node.role}</span></div>
      <div class="detail-row"><span class="dl">Client</span><span class="dv">${client ? client.name : '—'}</span></div>
    </div>`;
    if (client) {
      html += `<div class="conn-list"><div class="conn-list-item" onclick="focusNode('${client.id}')">
        <div class="cli-left"><span class="cli-dot" style="background:#00A4E4"></span><span class="cli-name">${client.name}</span><span class="cli-role">${client.status}</span></div></div></div>`;
    }
  } else {
    // Group
    const clientIds = Object.entries(DATA.clientGroups).filter(([,g]) => g === node.id).map(([c]) => c);
    html += `<div class="detail-section"><h4>Clients in Group (${clientIds.length})</h4><div class="conn-list">`;
    clientIds.forEach(cid => {
      const client = DATA.clients.find(c => c.id === cid);
      if (!client) return;
      html += `<div class="conn-list-item" onclick="focusNode('${cid}')">
        <div class="cli-left"><span class="cli-dot" style="background:#00A4E4"></span><span class="cli-name">${client.name}</span><span class="cli-role">${client.status}</span></div></div>`;
    });
    html += `</div></div>`;
  }

  // Actions
  html += `<div class="detail-actions">
    <button class="btn" onclick="showToast('✏️','Edit submitted for approval');closeDetail()">✏️ Edit</button>
    <button class="btn btn-primary" onclick="showToast('✅','Verified: ${node.label}');closeDetail()">✅ Verify</button>
    <button class="btn btn-agent" title="Coming Soon">🤖 Ask Agent</button>
  </div>`;

  body.innerHTML = html;
  document.getElementById('detail-overlay').classList.add('show');
  document.getElementById('detail-panel').classList.add('show');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('show');
  document.getElementById('detail-panel').classList.remove('show');
  selectedNode = null;
}

function focusNode(id) {
  const node = nodeMap[id];
  if (!node) return;
  cam.targetX = node.x;
  cam.targetY = node.y;
  cam.targetZoom = Math.max(cam.targetZoom, 1.2);
  selectNode(node);
}

// ============================================================
// SEARCH
// ============================================================
function handleSearch(val) {
  searchQuery = val.trim();
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const match = nodes.find(n =>
      n.label.toLowerCase().includes(q) ||
      (n.role && n.role.toLowerCase().includes(q)));
    if (match) {
      cam.targetX = match.x;
      cam.targetY = match.y;
    }
  }
}

// ============================================================
// VIEW TOGGLE
// ============================================================
function setView(view, el) {
  currentView = view;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');

  if (view === 'tree') {
    applyTreeLayout();
    cam.targetX = W / 2;
    cam.targetY = H / 2;
    cam.targetZoom = 0.9;
  } else {
    // Restart simulation to find natural layout
    simRunning = true;
    simAlpha = 0.5;
    // Randomize a bit so it re-settles
    nodes.forEach(n => {
      n.vx += (Math.random() - 0.5) * 5;
      n.vy += (Math.random() - 0.5) * 5;
    });
  }
}

// ============================================================
// TOAST
// ============================================================
function showToast(icon, message) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = '<span>' + icon + '</span>' + message;
  container.appendChild(toast);
  setTimeout(() => { toast.classList.add('toast-out'); setTimeout(() => toast.remove(), 300); }, 2800);
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); searchQuery = ''; document.getElementById('search').value = ''; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
});

// ============================================================
// INIT
// ============================================================
buildGraph();

// Start camera centered on "you" node
const youNode = nodes.find(n => n.you);
if (youNode) {
  cam.x = cam.targetX = youNode.x;
  cam.y = cam.targetY = youNode.y;
}
cam.zoom = cam.targetZoom = 0.85;

// Fade out help hint after 4 seconds
setTimeout(() => { if (helpVisible) { helpVisible = false; document.getElementById('help-hint').style.opacity = '0'; }}, 4000);

loop();
</script>
</body>
</html>
